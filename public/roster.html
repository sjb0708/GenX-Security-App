<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster — GenX Takeover Security</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-top: 24px;
    }
    .roster-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      transition: border-color 0.15s;
    }
    .roster-card:hover { border-color: var(--border-2); }
    .roster-card-top { display: flex; align-items: center; gap: 14px; }
    .roster-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800; color: var(--text-2);
      flex-shrink: 0; overflow: hidden;
    }
    .roster-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .roster-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .roster-role { font-size: 12px; color: var(--text-2); margin-top: 1px; }
    .roster-cat {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 2px 8px; border-radius: 20px; margin-top: 4px; display: inline-block;
    }
    .roster-cat.talent { background: rgba(88,166,255,0.12); color: #58a6ff; border: 1px solid rgba(88,166,255,0.3); }
    .roster-cat.crew   { background: rgba(63,185,80,0.1); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
    .roster-cat.staff  { background: rgba(230,57,70,0.1); color: var(--red); border: 1px solid rgba(230,57,70,0.3); }
    .roster-detail { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }
    .roster-detail svg { flex-shrink: 0; }
    .roster-actions { display: flex; gap: 8px; margin-top: 4px; }
    .roster-remove {
      position: absolute; top: 12px; right: 12px;
      background: transparent; border: none; color: var(--text-3);
      font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 6px;
      border-radius: 4px; transition: all 0.1s;
    }
    .roster-remove:hover { color: var(--red); background: var(--red-dim); }

    /* Add form */
    .add-form {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px; margin-top: 28px;
    }
    .add-form-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); margin-bottom: 16px; }
    .add-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 540px) { .add-form-grid { grid-template-columns: 1fr; } }
    .add-form-grid .full { grid-column: 1 / -1; }
    .f { display: flex; flex-direction: column; gap: 5px; }
    .f label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); }
    .f input, .f select {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: inherit; font-size: 13px; padding: 9px 12px;
      outline: none; transition: border-color 0.15s; width: 100%;
    }
    .f input:focus, .f select:focus { border-color: var(--red); }
    .f select option { background: var(--surface-2); }

    /* Filter bar */
    .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; color: var(--text-2); font-family: inherit; font-size: 12px; font-weight: 600; padding: 5px 14px; cursor: pointer; transition: all 0.15s; }
    .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
    .filter-search { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; padding: 7px 12px; outline: none; transition: border-color 0.15s; flex: 1; min-width: 160px; }
    .filter-search:focus { border-color: var(--red); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); font-size: 13px; }
    .empty-state .big { font-size: 32px; margin-bottom: 12px; }
    #fPhotoPreview:hover #fPhotoOverlay { opacity: 1 !important; }
  </style>
</head>
<body>

<nav class="topnav">
  <a class="nav-brand" href="/">
    <div class="nav-brand-icon">
      <img src="/genx-logo.png" alt="GenX" style="width:36px;height:36px;object-fit:contain;">
    </div>
    <div class="nav-brand-text">
      <span class="nav-brand-name">GenX Takeover</span>
      <span class="nav-brand-product">Security</span>
      <span class="nav-brand-sub">Event Security Management</span>
    </div>
  </a>
  <div class="nav-center">
    <div class="nav-breadcrumb">
      <a href="/" class="crumb" style="color:var(--text-2);text-decoration:none;">Dashboard</a>
      <span class="sep">/</span>
      <span class="current">Roster</span>
    </div>
  </div>
</nav>

<div style="max-width:1000px;margin:0 auto;padding:32px 24px 80px;">

  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;">
    <div>
      <h1 style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;">People Roster</h1>
      <p style="font-size:13px;color:var(--text-2);">Master list of talent & crew. Add them to any brief with one click — no re-entering info.</p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" id="importBtn" onclick="importFromBriefs()" style="border-color:rgba(88,166,255,0.4);color:#58a6ff;">⬇ Import from Briefs</button>
      <button class="btn btn-primary" onclick="showAddForm()">+ Add Person</button>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" style="margin-top:20px;">
    <input class="filter-search" id="searchInput" placeholder="Search by name, role, email…" oninput="renderRoster()">
    <button class="filter-btn active" data-cat="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-cat="talent" onclick="setFilter('talent')">Talent</button>
    <button class="filter-btn" data-cat="crew" onclick="setFilter('crew')">Crew</button>
    <button class="filter-btn" data-cat="staff" onclick="setFilter('staff')">Staff</button>
  </div>

  <!-- Roster grid -->
  <div class="roster-grid" id="rosterGrid"></div>

  <!-- Add / Edit form -->
  <div class="add-form" id="addForm" style="display:none;">
    <div class="add-form-title" id="addFormTitle">Add Person to Roster</div>
    <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">

      <!-- Photo -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;">
        <div id="fPhotoPreview" onclick="document.getElementById('fPhotoFile').click()" style="width:80px;height:80px;border-radius:50%;background:var(--surface-2);border:2px dashed var(--border-2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color 0.15s;position:relative;" onmouseover="this.style.borderColor='var(--red)'" onmouseout="this.style.borderColor='var(--border-2)'">
          <span id="fPhotoInitials" style="font-size:22px;font-weight:800;color:var(--text-3);">?</span>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);opacity:0;transition:opacity 0.15s;" id="fPhotoOverlay">📷</div>
        </div>
        <input type="file" id="fPhotoFile" accept="image/*" style="display:none;" onchange="previewRosterPhoto(this)">
        <button type="button" onclick="document.getElementById('fPhotoFile').click()" style="font-size:11px;font-weight:600;color:var(--text-3);background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-3)'">Change Photo</button>
      </div>

      <!-- Fields -->
      <div class="add-form-grid" style="flex:1;min-width:240px;">
        <div class="f">
          <label>Full Name <span style="color:var(--red);">*</span></label>
          <input id="fName" placeholder="Lisa Harrison" oninput="updateFormInitials()">
        </div>
        <div class="f">
          <label>Category</label>
          <select id="fCategory">
            <option value="talent">Talent</option>
            <option value="crew" selected>Crew</option>
            <option value="staff">Staff</option>
          </select>
        </div>
        <div class="f">
          <label>Role / Function</label>
          <input id="fRole" placeholder="Tour Manager">
        </div>
        <div class="f">
          <label>Phone</label>
          <input id="fPhone" type="tel" placeholder="(555) 000-0000">
        </div>
        <div class="f full">
          <label>Email</label>
          <input id="fEmail" type="email" placeholder="lisa@example.com">
        </div>
      </div>
    </div>

    <div id="addFormError" style="display:none;margin-top:12px;padding:10px 14px;background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.3);border-radius:8px;font-size:12px;color:var(--red);"></div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
      <button class="btn btn-ghost btn-sm" onclick="hideAddForm()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="addFormSaveBtn" onclick="savePerson()">Save to Roster</button>
    </div>
  </div>

</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let _roster = [];
let _filter = 'all';
let _editId = null;

async function load() {
  try {
    const res = await fetch('/api/roster');
    if (!res.ok) { window.location.href = '/'; return; }
    _roster = await res.json();
    renderRoster();
  } catch (e) {
    console.error(e);
  }
}

function setFilter(cat) {
  _filter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderRoster();
}

function getInitials(name) {
  return (name || '').split(' ').filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
}

function renderRoster() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('rosterGrid');
  const filtered = _roster.filter(p => {
    const matchCat = _filter === 'all' || p.category === _filter;
    const matchQ   = !q || [p.name, p.role, p.email, p.phone].some(v => (v||'').toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <div class="big">👤</div>
      ${_roster.length ? 'No people match that filter.' : 'No one on the roster yet. Click <strong>+ Add Person</strong> to get started.'}
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const initials = getInitials(p.name);
    const avatarInner = p.photo
      ? `<img src="${esc(p.photo)}" alt="">`
      : initials || '?';
    const catLabel = { talent: 'Talent', crew: 'Crew', staff: 'Staff' }[p.category] || p.category;
    return `
      <div class="roster-card">
        <button class="roster-remove" onclick="removePerson('${p.id}')" title="Remove from roster">×</button>
        <div class="roster-card-top">
          <div class="roster-avatar">${typeof avatarInner === 'string' && p.photo ? avatarInner : `<span style="font-size:17px;font-weight:800;">${initials||'?'}</span>`}</div>
          <div style="flex:1;min-width:0;">
            <div class="roster-name">${esc(p.name)}</div>
            ${p.role ? `<div class="roster-role">${esc(p.role)}</div>` : ''}
            <span class="roster-cat ${p.category}">${catLabel}</span>
          </div>
        </div>
        ${p.email ? `<div class="roster-detail"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M1 5l7 5 7-5" stroke="currentColor" stroke-width="1.4"/></svg>${esc(p.email)}</div>` : ''}
        ${p.phone ? `<div class="roster-detail"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 2h3l1 3-2 1a9 9 0 004 4l1-2 3 1v3a1 1 0 01-1 1A13 13 0 012 3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.4"/></svg>${esc(p.phone)}</div>` : ''}
        <div class="roster-actions">
          <button class="btn btn-ghost btn-sm" style="font-size:11px;" onclick="editPerson('${p.id}')">Edit</button>
        </div>
      </div>
    `;
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showAddForm() {
  _editId = null;
  document.getElementById('addFormTitle').textContent = 'Add Person to Roster';
  document.getElementById('addFormSaveBtn').textContent = 'Save to Roster';
  clearForm();
  document.getElementById('addForm').style.display = '';
  document.getElementById('addForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('fName').focus();
}

function hideAddForm() {
  document.getElementById('addForm').style.display = 'none';
  _editId = null;
  clearForm();
}

let _fPhotoData = ''; // base64 or URL of selected photo

function clearForm() {
  ['fName','fRole','fPhone','fEmail'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCategory').value = 'crew';
  document.getElementById('addFormError').style.display = 'none';
  document.getElementById('fPhotoFile').value = '';
  _fPhotoData = '';
  setFormPhoto('', '');
}

function setFormPhoto(url, name) {
  const preview = document.getElementById('fPhotoPreview');
  const initials = document.getElementById('fPhotoInitials');
  const overlay  = document.getElementById('fPhotoOverlay');
  if (url) {
    preview.style.backgroundImage = `url(${url})`;
    preview.style.backgroundSize = 'cover';
    preview.style.backgroundPosition = 'center';
    initials.style.display = 'none';
    overlay.style.display = 'flex';
  } else {
    preview.style.backgroundImage = '';
    initials.style.display = '';
    initials.textContent = name ? name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('') : '?';
    overlay.style.display = 'flex';
  }
}

function updateFormInitials() {
  if (!_fPhotoData) {
    const name = document.getElementById('fName').value;
    document.getElementById('fPhotoInitials').textContent = name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('') || '?';
  }
}

function previewRosterPhoto(input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    _fPhotoData = e.target.result;
    setFormPhoto(_fPhotoData, '');
  };
  reader.readAsDataURL(file);
}

function editPerson(id) {
  const p = _roster.find(r => r.id === id);
  if (!p) return;
  _editId = id;
  document.getElementById('fName').value     = p.name  || '';
  document.getElementById('fRole').value     = p.role  || '';
  document.getElementById('fPhone').value    = p.phone || '';
  document.getElementById('fEmail').value    = p.email || '';
  document.getElementById('fCategory').value = p.category || 'crew';
  document.getElementById('addFormError').style.display = 'none';
  document.getElementById('fPhotoFile').value = '';
  _fPhotoData = p.photo || '';
  setFormPhoto(p.photo || '', p.name || '');
  document.getElementById('addFormTitle').textContent = 'Edit Person';
  document.getElementById('addFormSaveBtn').textContent = 'Save Changes';
  document.getElementById('addForm').style.display = '';
  document.getElementById('addForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('fName').focus();
}

async function savePerson() {
  const name     = document.getElementById('fName').value.trim();
  const role     = document.getElementById('fRole').value.trim();
  const phone    = document.getElementById('fPhone').value.trim();
  const email    = document.getElementById('fEmail').value.trim();
  const category = document.getElementById('fCategory').value;

  if (!name) {
    document.getElementById('addFormError').textContent = 'Name is required.';
    document.getElementById('addFormError').style.display = '';
    return;
  }

  const btn = document.getElementById('addFormSaveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const url    = _editId ? `/api/roster/${_editId}` : '/api/roster';
    const method = _editId ? 'PUT' : 'POST';
    const res    = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, role, phone, email, category, photo: _fPhotoData }) });
    const data   = await res.json();
    if (!res.ok) throw new Error(data.error || 'Save failed');

    if (_editId) {
      const idx = _roster.findIndex(p => p.id === _editId);
      if (idx !== -1) _roster[idx] = data;
    } else {
      _roster.push(data);
    }
    hideAddForm();
    renderRoster();
    toast(_editId ? 'Profile updated' : `${name} added to roster`, 'success');
  } catch (e) {
    document.getElementById('addFormError').textContent = e.message;
    document.getElementById('addFormError').style.display = '';
    btn.disabled = false; btn.textContent = _editId ? 'Save Changes' : 'Save to Roster';
  }
}

async function removePerson(id) {
  const p = _roster.find(r => r.id === id);
  if (!confirm(`Remove ${p?.name || 'this person'} from the roster?`)) return;
  try {
    await fetch(`/api/roster/${id}`, { method: 'DELETE' });
    _roster = _roster.filter(r => r.id !== id);
    renderRoster();
    toast('Removed from roster', 'success');
  } catch (e) {
    toast('Failed to remove', 'error');
  }
}

function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
}

async function importFromBriefs() {
  const btn = document.getElementById('importBtn');
  btn.disabled = true; btn.textContent = 'Importing…';
  try {
    const res  = await fetch('/api/roster/import-from-briefs', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Import failed');
    // Reload roster
    const r2 = await fetch('/api/roster');
    _roster = r2.ok ? await r2.json() : _roster;
    renderRoster();
    toast(data.added > 0 ? `Imported ${data.added} ${data.added === 1 ? 'person' : 'people'} from your briefs` : 'Everyone is already on the roster', data.added > 0 ? 'success' : 'success');
  } catch (e) {
    toast('Import failed', 'error');
  }
  btn.disabled = false; btn.textContent = '⬇ Import from Briefs';
}

load();
</script>
</body>
</html>
